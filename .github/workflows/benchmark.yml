name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 1 * * 1'  # Weekly on Monday at 1 AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Run OMS benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build model-signing binary and conformance adapter
        run: |
          make build
          go build -o test/conformance/go-conformance ./test/conformance/

      - name: Run OMS benchmark harness
        uses: sampras343/model-signing-conformance/benchmark-action@main
        with:
          entrypoint:        ${{ github.workspace }}/test/conformance/go-conformance
          model-signing-bin: ${{ github.workspace }}/build/model-signing
          private-key:       ${{ github.workspace }}/_conformance/test/assets/keys/p384/signing-key.pem
          public-key:        ${{ github.workspace }}/_conformance/test/assets/keys/p384/signing-key-pub.pem
          # Certificate material for certificate-method benchmark scenarios.
          signing-cert:            ${{ github.workspace }}/_conformance/test/assets/keys/certificate/signing-key-cert.pem
          cert-chain:              >-
            ${{ github.workspace }}/_conformance/test/assets/keys/certificate/int-ca-cert.pem
            ${{ github.workspace }}/_conformance/test/assets/keys/certificate/ca-cert.pem
          certificate-private-key: ${{ github.workspace }}/_conformance/test/assets/keys/certificate/signing-key.pem
          ci:                'true'
          output:            benchmark-results.json
