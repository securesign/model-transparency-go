name: Conformance

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 8 * * 1,4'  # Mon/Thu 8 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  conformance:
    name: Run OMS conformance suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build model-signing binary
        run: make build

      - name: Build Go conformance adapter
        run: go build -o test/conformance/go-conformance ./test/conformance/

      - uses: sampras343/model-signing-conformance@main
        with:
          entrypoint: ${{ github.workspace }}/test/conformance/go-conformance
          skip-result-upload: 'true'
          xfail: |
            test_roundtrip[key-empty-model-rejected
            test_roundtrip[key-symlink-cycle
            test_roundtrip[key-symlink-default-rejected
            test_roundtrip[key-symlink-outside-root
        env:
          MODEL_SIGNING_BIN: ${{ github.workspace }}/build/model-signing

      - name: Upload conformance report
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v7
        with:
          name: conformance-report
          path: conformance-report.json
          if-no-files-found: warn
